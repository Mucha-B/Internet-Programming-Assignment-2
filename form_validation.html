<!-- Returning false stops the form from submitting. -->
<form onsubmit="return validate()">
    Name: <input type="text" id="username" placeholder="Username"> <br/>
    Password: <input type="password" id="pwd" placeholder="Password" style="margin-top: 50px;">
    <button type="submit">Login</button>
</form>

<!-- FOOTER - at the bottom of body -->
<footer>
    <p>&copy; 2026 MyCompany. All Rights Reserved.</p>
</footer>

<!-- SCRIPT - after footer (best practice) -->
<script>
let myText = "Smooz Operator";
// alert(myText);
function validate() {
    let username = document.getElementById('username').value;
    let password = document.getElementById('pwd').value;
    
    if (username === "") {
        alert("Username is required");
        return false;
    }
    
    if (password === "") {
        alert("Password is required");
        return false;
    }
    
    if (password.length < 4) {
        alert("Password too short");
        return false;
    }
    
    return true; // Form is valid
}
</script>
